<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>カスタムルーレット</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f4f4}
.header{padding:15px;text-align:center;background:#222;color:#fff}
.container{max-width:1100px;margin:auto;padding:15px}
.card{background:#fff;padding:15px;margin:12px 0;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
button{padding:8px 12px;margin:4px;cursor:pointer}
input{padding:8px;margin:4px}
.result{font-size:22px;font-weight:bold;margin-top:10px}
.item{display:flex;justify-content:space-between;gap:10px;margin:4px 0}
#loginScreen{display:flex;justify-content:center;align-items:center;height:100vh}
.hidden{display:none}
.roulette{font-size:28px;font-weight:bold;height:40px}
@media(max-width:600px){
 .item{flex-direction:column}
 input{width:100%;box-sizing:border-box}
 button{width:100%}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="card">
    <h2>パスワード認証</h2>
    <input type="password" id="pw" placeholder="パスワード">
    <button onclick="login()">ログイン</button>
    <p id="loginMsg"></p>
  </div>
</div>

<div id="app" class="hidden">
  <div class="header">
    <h1>カスタムルーレット</h1>
  </div>

  <div class="container">
    <button onclick="drawAll()">全カテゴリ抽選</button>
    <button onclick="exportData()">設定エクスポート</button>
    <input type="file" id="importFile" onchange="importData(event)">

    <div id="categories"></div>

    <div class="card">
      <h2>カテゴリ追加</h2>
      <input id="newCategory" placeholder="カテゴリ名">
      <button onclick="addCategory()">追加</button>
    </div>
  </div>
</div>

<script>
const PASSWORD="deltaomoroi";

let categories=JSON.parse(localStorage.getItem("rouletteData"))||{
 "オペレーター":["Sledge","Ash","Thermite"],
 "武器":["AK-12","M4","MP5"],
 "防具":["3装","4装","5装"]
};

function login(){
 const p=document.getElementById("pw").value;
 if(p===PASSWORD){
   document.getElementById("loginScreen").classList.add("hidden");
   document.getElementById("app").classList.remove("hidden");
 }else{
   document.getElementById("loginMsg").innerText="パスワードが違います";
 }
}

function save(){
 localStorage.setItem("rouletteData",JSON.stringify(categories));
}

function render(){
 const area=document.getElementById("categories");
 area.innerHTML="";

 Object.keys(categories).forEach(cat=>{
   const div=document.createElement("div");
   div.className="card";

   let items="";
   categories[cat].forEach((v,i)=>{
     items+=`
     <div class="item">
       <span>${v}</span>
       <button onclick="deleteItem('${cat}',${i})">削除</button>
     </div>`;
   });

   div.innerHTML=`
   <h2>${cat}</h2>
   <div id="result-${cat}" class="roulette">未抽選</div>
   <button onclick="draw('${cat}')">抽選</button>
   <button onclick="deleteCategory('${cat}')">カテゴリ削除</button>

   <h3>項目一覧</h3>
   ${items}

   <input id="add-${cat}" placeholder="追加項目">
   <button onclick="addItem('${cat}')">追加</button>
   `;

   area.appendChild(div);
 });
 save();
}

function animateDraw(cat,list,target){
 let count=0;
 const el=document.getElementById("result-"+cat);

 const timer=setInterval(()=>{
   el.innerText=list[Math.floor(Math.random()*list.length)];
   count++;
   if(count>20){
      clearInterval(timer);
      el.innerText="★ "+target+" ★";
   }
 },100);
}

function draw(cat){
 const list=categories[cat];
 if(!list.length){alert("項目がありません");return;}
 const target=list[Math.floor(Math.random()*list.length)];
 animateDraw(cat,list,target);
}

function drawAll(){
 Object.keys(categories).forEach(draw);
}

function addItem(cat){
 const v=document.getElementById("add-"+cat).value.trim();
 if(!v)return;
 categories[cat].push(v);
 render();
}

function deleteItem(cat,i){
 categories[cat].splice(i,1);
 render();
}

function addCategory(){
 const name=document.getElementById("newCategory").value.trim();
 if(!name)return;
 if(categories[name]) return alert("既に存在します");
 categories[name]=[];
 render();
}

function deleteCategory(cat){
 if(confirm(cat+"を削除しますか？")){
   delete categories[cat];
   render();
 }
}

function exportData(){
 const blob=new Blob([JSON.stringify(categories,null,2)],{type:"application/json"});
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="roulette-settings.json";
 a.click();
}

function importData(e){
 const file=e.target.files[0];
 if(!file) return;

 const reader=new FileReader();
 reader.onload=function(){
   try{
      categories=JSON.parse(reader.result);
      render();
      alert("インポート完了");
   }catch{
      alert("JSON形式が不正です");
   }
 };
 reader.readAsText(file);
}

render();
</script>
</body>
</html>
